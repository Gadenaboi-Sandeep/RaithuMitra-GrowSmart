spring.application.name=raithumitra-backend

# Server port — Railway injects PORT automatically
server.port=${PORT:8080}
server.address=0.0.0.0

# MySQL Database Configuration — values come from Railway environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/raithu_mitra?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sandeep@1922}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP — retry DB connection on startup (prevents crash if MySQL not ready)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:RaithuMitraSecrettttttttttttttttttttttttttttttttttttttttttttttttttttttttttttttttttttttttttKeyForSigning}
jwt.expiration=86400000
# 24 hours

# File Upload Configuration
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
